<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLO:AI - 스마트 스타일러</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f8fafc; }
        .notification {
            position: fixed; top: 20px; right: 20px; padding: 15px 20px;
            background: #334155; color: #fff; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000;
        }
        #recommendBox { margin-top: 20px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; width: 300px; }
    </style>
    <script>
        function showNotification(message) {
            const div = document.createElement('div');
            div.className = 'notification';
            div.textContent = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function renderCodiResultUI(message) {
            const box = document.getElementById('recommendBox');
            box.innerHTML = `<p>${message}</p>`;
            console.log("UI 갱신 완료:", message);
        }

        // 실시간 동기화를 위한 상태 재조회 함수 (필요 시 호출)
        async function refreshCloudData() {
            console.log("클라우드 데이터 재조회 중...");
            // 여기서 서버 데이터를 다시 받아와 UI를 갱신합니다.
        }

        async function wearCodi(currentTop, currentBottom, currentShoes) {
            if (!currentTop || !currentBottom || !currentShoes) {
                showNotification('아이템 정보를 불러올 수 없습니다.');
                return;
            }
            
            // 1. 상태 변경 로직
            for (const item of [currentTop, currentBottom, currentShoes]) {
                if (item && !(item.categories.includes('신발') || item.categories.includes('악세사리'))) {
                    item.status = '세탁중';
                    // 2. 서버 업데이트 시도
                    if (window.cloudUpdateItemStatus) {
                        await window.cloudUpdateItemStatus(item.id, '세탁중');
                    }
                }
            }

            // 3. 업데이트 후 즉시 UI 및 데이터 재동기화
            await refreshCloudData();
            showNotification('코디 착용 기록이 서버에 반영되었습니다.');
            renderCodiResultUI('착용 완료 및 클라우드 동기화 성공');
        }
    </script>
</head>
<body>
    <h1>CLO:AI 스타일러</h1>
    <div id="recommendBox">코디를 선택하세요.</div>
    <button onclick="wearCodi({id:1, categories:['상의'], status:'입음'}, {id:2, categories:['하의'], status:'입음'}, {id:3, categories:['신발'], status:'입음'})">
        코디 착용 및 실시간 동기화 테스트
    </button>
</body>
</html>
